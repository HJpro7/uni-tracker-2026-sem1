<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uni Semester Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f4f0;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#6b6a65;--text3:#9b9a95;
  --green:#1D9E75;--red:#E24B4A;--amber:#BA7517;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--bg2:#242422;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --text:#e8e6df;--text2:#9b9a95;--text3:#6b6a65;
  }
}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 24px 60px;display:flex;justify-content:center;}
.container{width:100%;max-width:1400px;}
h1{font-size:22px;font-weight:600;margin-bottom:3px;}
.subtitle{font-size:12.5px;color:var(--text3);margin-bottom:20px;}
.top-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.fbtn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:background .15s;font-family:inherit;}
.fbtn:hover,.fbtn.active{background:var(--bg2);color:var(--text);}
.fbtn.red{color:var(--red);}
.edit-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.edit-btn.on{background:#FAEEDA;color:#633806;border-color:#EF9F27;}
@media(prefers-color-scheme:dark){.edit-btn.on{background:#412402;color:#FAC775;}}
.spacer{flex:1;}
.save-ind{font-size:11px;color:var(--text3);opacity:0;transition:opacity .4s;margin-right:5px;}
.save-ind.error{color:var(--red);}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-track{width:90px;height:4px;background:var(--border);border-radius:2px;}
.prog-fill{height:4px;background:var(--green);border-radius:2px;transition:width .3s;}
.prog-txt{font-size:11.5px;color:var(--text3);white-space:nowrap;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
@media(max-width:800px){.two-col{grid-template-columns:1fr;}.right-col{order:-1;}}
.right-col{display:flex;flex-direction:column;gap:16px;}
.panel{border:0.5px solid var(--border);border-radius:14px;padding:20px;background:var(--bg);}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-head h3{font-size:13px;font-weight:600;color:var(--text2);margin:0;}
.panel-btn{font-size:11.5px;padding:2px 10px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.panel-btn:hover{background:var(--bg2);}
.break-divider{text-align:center;font-size:11px;font-style:italic;color:var(--text3);padding:9px 0;border-top:0.5px dashed var(--border);border-bottom:0.5px dashed var(--border);margin:7px 0;}
.week-card{border:0.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;background:var(--bg);transition:opacity .25s;}
.week-card.hidden{display:none;}
.week-card.behind{border-left:3px solid var(--red);}
.week-card.current{border-left:3px solid var(--green);}
.week-card.exam-card{border-left:3px solid var(--amber);}
.week-card.all-done{opacity:0.42;}
.card-head{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.card-head:hover{background:var(--bg2);}
.wk-num{font-size:14px;font-weight:600;color:var(--text);}
.wk-dates{font-size:12px;color:var(--text3);}
.wk-badge{font-size:10.5px;padding:2px 9px;border-radius:9px;font-weight:500;}
.badge-current{background:#EAF3DE;color:#27500A;}
.badge-behind{background:#FCEBEB;color:#A32D2D;}
@media(prefers-color-scheme:dark){
  .badge-current{background:#173404;color:#C0DD97;}
  .badge-behind{background:#501313;color:#F09595;}
}
.card-prog{font-size:11.5px;color:var(--text3);margin-left:auto;}
.chevron{width:13px;height:13px;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0;}
.chevron svg{width:11px;height:11px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.week-card.collapsed .chevron{transform:rotate(-90deg);}
.week-card.collapsed .card-body{display:none;}
.subj-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-top:0.5px solid var(--border);}
.subj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-CAD{background:#378ADD;}.dot-Vibrations{background:#1D9E75;}.dot-Materials{background:#7F77DD;}.dot-Heat{background:#D85A30;}
.subj-name{font-size:12.5px;font-weight:600;color:var(--text);width:80px;flex-shrink:0;}
.pills{display:flex;flex-wrap:wrap;gap:5px;flex:1;align-items:center;}
.pill{font-size:12px;padding:3px 11px;border-radius:20px;cursor:pointer;transition:opacity .15s;user-select:none;display:flex;align-items:center;gap:4px;font-family:inherit;}
.pill.done{opacity:0.25;text-decoration:line-through;}
.pill::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;}
.pill.done::before{background:currentColor;}
.p-lec{background:#E6F1FB;color:#0C447C;}.p-tut{background:#E1F5EE;color:#085041;}
.p-lab{background:#FAEEDA;color:#633806;}.p-wksh{background:#EEEDFE;color:#3C3489;}
.p-asgn{background:#FAECE7;color:#712B13;}.p-exam{background:#FAEEDA;color:#633806;}
@media(prefers-color-scheme:dark){
  .p-lec{background:#0C447C;color:#B5D4F4;}.p-tut{background:#085041;color:#9FE1CB;}
  .p-lab{background:#633806;color:#FAC775;}.p-wksh{background:#3C3489;color:#CECBF6;}
  .p-asgn{background:#712B13;color:#F5C4B3;}.p-exam{background:#633806;color:#FAC775;}
}
.due{font-size:10.5px;color:var(--red);font-weight:500;margin-left:1px;}
.del-pill{display:none;margin-left:2px;font-size:11px;opacity:0.55;cursor:pointer;}
.edit-mode .del-pill{display:inline;}
.pill:hover .del-pill{opacity:1;}
.add-row{display:none;padding:7px 16px 9px;border-top:0.5px solid var(--border);gap:6px;flex-wrap:wrap;align-items:center;}
.edit-mode .add-row{display:flex;}
.add-row select,.add-row input{font-size:12px;padding:3px 9px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);height:28px;font-family:inherit;}
.add-row input[type="text"]{width:130px;}
.add-row input[type="date"]{width:140px;}
.add-row button{font-size:12px;padding:3px 11px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;}
.add-lbl{font-size:12px;color:var(--text3);}
.week-cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;}
.week-cb.ticked{background:var(--green);border-color:var(--green);}
.week-cb.ticked::after{content:'';display:block;width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);}
.asgn-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.asgn-row:last-child{border-bottom:none;}
.asgn-row.done-asgn{opacity:0.32;}
.asgn-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.asgn-label{font-size:12.5px;color:var(--text);flex:1;}
.asgn-dates{font-size:11px;color:var(--text3);white-space:nowrap;margin-right:2px;}
.asgn-badge{font-size:11px;padding:2px 8px;border-radius:9px;font-weight:500;white-space:nowrap;cursor:pointer;}
.dl-urgent{background:#FCEBEB;color:#A32D2D;}.dl-soon{background:#FAEEDA;color:#633806;}
.dl-ok{background:#EAF3DE;color:#27500A;}.dl-tbc{background:var(--bg2);color:var(--text3);}
@media(prefers-color-scheme:dark){
  .dl-urgent{background:#501313;color:#F09595;}.dl-soon{background:#412402;color:#FAC775;}
  .dl-ok{background:#173404;color:#C0DD97;}
}
.del-asgn{font-size:11px;color:var(--text3);cursor:pointer;opacity:0.5;padding:0 2px;flex-shrink:0;display:none;}
.del-asgn:hover{opacity:1;color:var(--red);}
.edit-mode .del-asgn{display:inline;}
.add-dl-form{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:10px 0 2px;border-top:0.5px solid var(--border);margin-top:8px;}
.add-dl-form label{font-size:11px;color:var(--text3);}
.add-dl-form select,.add-dl-form input{font-size:12px;padding:3px 9px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);height:28px;font-family:inherit;}
.add-dl-form input[type="text"]{width:120px;}
.add-dl-form input[type="date"]{width:136px;}
.add-dl-form button{font-size:12px;padding:3px 11px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;}
.date-pair{display:flex;align-items:center;gap:5px;}
.gantt-month-row{position:relative;height:18px;margin-bottom:7px;}
.gantt-month-lbl{position:absolute;font-size:11px;color:var(--text3);transform:translateX(-50%);}
.gantt-rows-wrap{position:relative;}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:0.5px;background:var(--border);z-index:1;pointer-events:none;}
.gantt-row{display:flex;align-items:center;margin-bottom:7px;gap:8px;position:relative;z-index:2;}
.gantt-lbl{font-size:11.5px;color:var(--text2);width:64px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-track{flex:1;border-radius:5px;background:var(--bg2);position:relative;min-height:24px;}
.gantt-bar{position:absolute;top:3px;height:18px;border-radius:4px;font-size:10.5px;font-weight:500;display:flex;align-items:center;padding:0 7px;overflow:hidden;white-space:nowrap;min-width:4px;z-index:2;cursor:default;}
.gantt-tooltip{position:fixed;background:var(--text);color:var(--bg);font-size:11px;padding:4px 9px;border-radius:7px;pointer-events:none;z-index:999;white-space:nowrap;opacity:0;transition:opacity .15s;}
.gantt-today-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--red);opacity:0.6;z-index:5;}
.gantt-today-row{position:relative;height:16px;margin-top:5px;}
.gantt-today-lbl{position:absolute;font-size:10px;color:var(--red);font-weight:600;transform:translateX(-50%);white-space:nowrap;}
.g-cad1{background:#B5D4F4;color:#0C447C;}.g-cad2{background:#378ADD;color:#fff;}
.g-vib1{background:#9FE1CB;color:#085041;}
.g-mat1{background:#CECBF6;color:#3C3489;}.g-mat2{background:#7F77DD;color:#fff;}
.g-hea1{background:#F5C4B3;color:#712B13;}
.g-gen1{background:#D3D1C7;color:#444441;}.g-gen2{background:#FAEEDA;color:#633806;}
@media(prefers-color-scheme:dark){
  .g-cad1{background:#0C447C;color:#B5D4F4;}.g-cad2{background:#185FA5;color:#E6F1FB;}
  .g-vib1{background:#085041;color:#9FE1CB;}
  .g-mat1{background:#3C3489;color:#CECBF6;}.g-mat2{background:#534AB7;color:#EEEDFE;}
  .g-hea1{background:#712B13;color:#F5C4B3;}
  .g-gen1{background:#444441;color:#D3D1C7;}.g-gen2{background:#412402;color:#FAC775;}
}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;font-size:13px;color:var(--text3);transition:opacity .3s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div class="gantt-tooltip" id="gTooltip"></div>
<div class="container">
<div class="loading-overlay" id="loader">Loading your tracker...</div>
<h1>Uni semester tracker</h1>
<p class="subtitle">2026 &mdash; CAD &middot; Vibrations &middot; Materials &middot; Heat</p>
<div class="top-bar">
  <button class="fbtn active" onclick="filt('all',this)">All</button>
  <button class="fbtn red" onclick="filt('behind',this)">Behind</button>
  <button class="fbtn" onclick="filt('upcoming',this)">Upcoming</button>
  <button class="fbtn" onclick="filt('CAD',this)">CAD</button>
  <button class="fbtn" onclick="filt('Vibrations',this)">Vibrations</button>
  <button class="fbtn" onclick="filt('Materials',this)">Materials</button>
  <button class="fbtn" onclick="filt('Heat',this)">Heat</button>
  <div class="spacer"></div>
  <span class="save-ind" id="saveInd">Saved</span>
  <button class="edit-btn" id="editToggle" onclick="toggleEdit()">Edit mode</button>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <span class="prog-txt" id="ptxt">0 / 0</span>
  </div>
</div>
<div class="two-col">
  <div id="cards"></div>
  <div class="right-col">
    <div class="panel">
      <h3 style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;">Timeline</h3>
      <div id="gantt"></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h3>Assignments &amp; deadlines</h3>
        <button class="panel-btn" id="dlAddBtn" onclick="toggleAddDl()" style="display:none">+ Add</button>
      </div>
      <div id="dlRows"></div>
      <div class="add-dl-form" id="addDlForm" style="display:none">
        <select id="dlSubj">
          <option value="CAD">CAD</option>
          <option value="Vibrations">Vibrations</option>
          <option value="Materials">Materials</option>
          <option value="Heat">Heat</option>
          <option value="All">All</option>
        </select>
        <input type="text" id="dlLabel" placeholder="Task name"/>
        <div class="date-pair"><label>Start</label><input type="date" id="dlStart"/></div>
        <div class="date-pair"><label>Due</label><input type="date" id="dlEnd"/></div>
        <button onclick="addDlFromForm()">+ Add</button>
      </div>
    </div>
  </div>
</div>
</div>
<script>
var DB_URL='https://uni-tracker-f035f-default-rtdb.asia-southeast1.firebasedatabase.app/tasks.json';
var DB_DL_URL='https://uni-tracker-f035f-default-rtdb.asia-southeast1.firebasedatabase.app/deadlines.json';
var subjects=['CAD','Vibrations','Materials','Heat'];
var pillCls={lec:'p-lec',tut:'p-tut',lab:'p-lab',wksh:'p-wksh',asgn:'p-asgn',exam:'p-exam'};
var editMode=false,pillMap={},cardPills={},idCounter=0,saveTimer=null,saveDebounce=null,dlSaveDebounce=null;
var deletedKeys=new Set();
var chevSvg='<svg viewBox="0 0 11 11"><polyline points="2,3 5.5,7.5 9,3"/></svg>';
var SEMESTER_START=new Date(2026,1,16,0,0,0,0);
var BREAK_START=new Date(2026,3,6,0,0,0,0);
var BREAK_END=new Date(2026,3,20,0,0,0,0);
var GS=new Date(2026,1,16,0,0,0,0);
var GE=new Date(2026,6,15,0,0,0,0);
var GSPAN=GE.getTime()-GS.getTime();

function pct(d){return Math.max(0,Math.min(100,((d.getTime()-GS.getTime())/GSPAN)*100));}
function fmtDate(d){var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+m[d.getMonth()];}
function getWeekStart(wk){
  var d=new Date(SEMESTER_START.getTime()+(wk-1)*7*24*60*60*1000);
  if(d>=BREAK_START) d=new Date(d.getTime()+(BREAK_END.getTime()-BREAK_START.getTime()));
  return d;
}
function getWeekLabel(wk){
  var s=getWeekStart(wk),e=new Date(s.getTime()+6*24*60*60*1000);
  return fmtDate(s)+' \u2013 '+fmtDate(e);
}
function getCurrentWeek(){
  var now=new Date();now.setHours(0,0,0,0);
  if(now<SEMESTER_START) return 1;
  if(now>=BREAK_START&&now<BREAK_END) return -1;
  var adj=new Date(now.getTime());
  if(now>=BREAK_END) adj=new Date(now.getTime()-(BREAK_END.getTime()-BREAK_START.getTime()));
  var days=Math.floor((adj.getTime()-SEMESTER_START.getTime())/(24*60*60*1000));
  return Math.min(12,Math.max(1,Math.floor(days/7)+1));
}
var currentWeek=getCurrentWeek();
function displayWk(wk){return wk<=7?wk:wk+2;}
function daysUntil(d){var n=new Date();n.setHours(0,0,0,0);return Math.round((d.getTime()-n.getTime())/86400000);}
function badgeCls(days){
  if(days===null)return 'dl-tbc';
  if(days<0)return 'dl-tbc';
  if(days<=7)return 'dl-urgent';
  if(days<=21)return 'dl-soon';
  return 'dl-ok';
}
function badgeTxt(days){
  if(days===null)return 'TBC';
  if(days<0)return 'Past';
  if(days===0)return 'Today';
  return days+'d';
}

var subjDotCls={CAD:'dot-CAD',Vibrations:'dot-Vibrations',Materials:'dot-Materials',Heat:'dot-Heat',All:''};
var subjBarCls={CAD:'g-cad1',Vibrations:'g-vib1',Materials:'g-mat1',Heat:'g-hea1',All:'g-gen2'};

var userDeadlines=[];
var completedOpen=false;

var BASE_DEADLINES=[
  {id:'dl-mat-cs',subj:'Materials',label:'Industry case study',start:new Date(2026,2,1),end:new Date(2026,3,5),done:false,deleted:false},
  {id:'dl-cad-asgn',subj:'CAD',label:'CAD Assignment',start:new Date(2026,1,16),end:new Date(2026,3,10),done:false,deleted:false},
  {id:'dl-cad-lab',subj:'CAD',label:'Lab report',start:null,end:null,done:false,deleted:false},
  {id:'dl-vib-lab',subj:'Vibrations',label:'Lab report',start:null,end:null,done:false,deleted:false},
  {id:'dl-mat-lab',subj:'Materials',label:'Lab report',start:null,end:null,done:false,deleted:false},
  {id:'dl-hea-lab',subj:'Heat',label:'Lab report',start:null,end:null,done:false,deleted:false},
  {id:'dl-exams',subj:'All',label:'Final exams',start:new Date(2026,5,1),end:new Date(2026,5,21),done:false,deleted:false,showStart:true},
];

var BASE_GANTT=[
  {lbl:'CAD',bars:[
    {cls:'g-cad1',s:new Date(2026,1,16),e:new Date(2026,3,10),txt:'Assignment',dlId:'dl-cad-asgn'},
  ]},
  {lbl:'Vibrations',bars:[]},
  {lbl:'Materials',bars:[
    {cls:'g-mat1',s:new Date(2026,2,1),e:new Date(2026,3,5),txt:'Case study',dlId:'dl-mat-cs'},
  ]},
  {lbl:'Heat',bars:[]},
  {lbl:'General',bars:[
    {cls:'g-gen1',s:BREAK_START,e:BREAK_END,txt:'Break'},
    {cls:'g-gen2',s:new Date(2026,5,1),e:new Date(2026,5,21),txt:'Exams',dlId:'dl-exams'},
  ]},
];

function getAllDeadlines(){
  return BASE_DEADLINES.filter(function(d){return !d.deleted;})
    .concat(userDeadlines.filter(function(d){return !d.deleted;}))
    .sort(function(a,b){
      if(!a.end&&!b.end)return 0;
      if(!a.end)return 1;
      if(!b.end)return -1;
      return a.end.getTime()-b.end.getTime();
    });
}

function buildDeadlines(){
  var list=document.getElementById('dlRows');list.innerHTML='';
  var all=getAllDeadlines();
  var active=all.filter(function(d){return !d.done;});
  var done=all.filter(function(d){return d.done;});
  function makeRow(dl){
    var refDate=dl.showStart?dl.start:dl.end;
    var days=refDate?daysUntil(refDate):null;
    var datesStr=dl.start&&dl.end?fmtDate(dl.start)+' – '+fmtDate(dl.end):dl.end?fmtDate(dl.end):dl.start?fmtDate(dl.start):'TBC';
    var dc=subjDotCls[dl.subj]||'';
    var dotHtml=dc?'<div class="asgn-dot '+dc+'"></div>':'<div style="width:9px;height:9px;border-radius:50%;background:var(--amber);flex-shrink:0"></div>';
    var row=document.createElement('div');
    row.className='asgn-row';
    var dlId=dl.id;
    var cbHtml='<div class="dl-cb'+(dl.done?' dl-cb-done':'')+'" style="width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;'+(dl.done?'background:var(--green);border-color:var(--green);':'')+'">'+(dl.done?'<svg width="9" height="6" viewBox="0 0 9 6" fill="none"><polyline points="1,3 3.5,5.5 8,1" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')+'</div>';
    row.innerHTML=cbHtml+dotHtml
      +'<span class="asgn-label" style="cursor:text;'+(dl.done?'text-decoration:line-through;opacity:0.4;':'')+'" title="Click to edit">'+dl.subj+' — '+dl.label+'</span>'
      +'<span class="asgn-dates" style="cursor:text;'+(dl.done?'opacity:0.4;':'')+'" title="Click to edit dates">'+datesStr+'</span>'

function delDl(id){

  else{var ud=userDeadlines.find(function(d){return d.id===id;});if(ud)ud.deleted=true;}

  buildGantt();
  saveDlState();
}

function findDl(id){

}

function loadDlState(state){

  if(state.baseDone) BASE_DEADLINES.forEach(function(d){if(state.baseDone[d.id]!==undefined)d.done=state.baseDone[d.id];});
  if(state.baseDeleted) BASE_DEADLINES.forEach(function(d){if(state.baseDeleted[d.id])d.deleted=true;});
  if(state.user) userDeadlines=state.user.map(function(d){

      start:d.start?new Date(d.start):null,
      end:d.end?new Date(d.end):null,done:d.done,deleted:d.deleted||false};

function buildGantt(){
  var g=document.getElementById('gantt');g.innerHTML='';
  var now=new Date();now.setHours(0,0,0,0);
  var todayPct=pct(now);
  var mRow=document.createElement('div');mRow.className='gantt-month-row';
  months.forEach(function(m){
    var lbl=document.createElement('div');lbl.className='gantt-month-lbl';
    lbl.style.left='calc(64px + 8px + (100% - 72px)*'+(pct(m.d)/100)+')';lbl.textContent=m.lbl;
    mRow.appendChild(lbl);
  });
  g.appendChild(mRow);
  var wrap=document.createElement('div');wrap.className='gantt-rows-wrap';
  months.forEach(function(m){
    var line=document.createElement('div');line.className='gantt-grid-line';
    line.style.left='calc(64px + 8px + (100% - 72px)*'+(pct(m.d)/100)+')';
    wrap.appendChild(line);
  });
  var allRows=BASE_GANTT.map(function(r){
    return {lbl:r.lbl,bars:r.bars.filter(function(b){
      if(!b.dlId)return true;
      var dl=BASE_DEADLINES.find(function(d){return d.id===b.dlId;});
      return !dl||!dl.done;
    })};
  });
  userDeadlines.filter(function(d){return !d.deleted&&!d.done&&(d.start||d.end);}).forEach(function(dl){
    var s=dl.start||(dl.end?new Date(dl.end.getTime()-14*86400000):null);
    var e=dl.end||new Date(s.getTime()+14*86400000);
    var rowLbl=dl.subj==='All'?'General':dl.subj;
    var existing=allRows.find(function(r){return r.lbl===rowLbl;});
    var bar={cls:subjBarCls[dl.subj]||'g-gen2',s:s,e:e,txt:dl.label};
    if(existing)existing.bars.push(bar);
    else allRows.push({lbl:rowLbl,bars:[bar]});
  });
  allRows.forEach(function(r){
    var row=document.createElement('div');row.className='gantt-row';
    row.style.alignItems='flex-start';
    var lbl=document.createElement('div');lbl.className='gantt-lbl';lbl.style.paddingTop='3px';lbl.textContent=r.lbl;
    var track=document.createElement('div');track.className='gantt-track';
    var lanes=[];
    r.bars.forEach(function(b){
      var l=pct(b.s),w=pct(b.e)-l;
      var laneIdx=0;
      for(var li=0;li<lanes.length;li++){
        if(lanes[li]<=l){laneIdx=li;break;}
        if(li===lanes.length-1)laneIdx=lanes.length;
      }
      if(laneIdx>=lanes.length)lanes.push(0);
      lanes[laneIdx]=l+Math.max(0.5,w);
      var bar=document.createElement('div');
      bar.className='gantt-bar '+b.cls;
      bar.style.left=l+'%';
      bar.style.width=Math.max(0.5,w)+'%';
      bar.style.top=(3+laneIdx*22)+'px';
      if(w>8){
        bar.textContent=b.txt;
      } else {
        bar.style.borderRadius='50%';bar.style.width='16px';bar.style.height='16px';bar.style.top=(3+laneIdx*22+1)+'px';bar.style.padding='0';
        (function(label){
          bar.addEventListener('mouseenter',function(e){showGTip(e,label);});
          bar.addEventListener('mousemove',function(e){moveGTip(e);});
          bar.addEventListener('mouseleave',function(){hideGTip();});
        })(b.txt);
      }
      track.appendChild(bar);
    });
    var trackH=Math.max(24,lanes.length*22+6);
    track.style.height=trackH+'px';
    var tl=document.createElement('div');tl.className='gantt-today-line';tl.style.left=todayPct+'%';
    track.appendChild(tl);
    row.appendChild(lbl);row.appendChild(track);
    wrap.appendChild(row);
  });
  g.appendChild(wrap);
  var tlRow=document.createElement('div');tlRow.className='gantt-today-row';
  var tlLbl=document.createElement('div');tlLbl.className='gantt-today-lbl';
  tlLbl.style.left='calc(64px + 8px + (100% - 72px)*'+(todayPct/100)+')';
  tlLbl.textContent='today \u2014 '+fmtDate(now);
  tlRow.appendChild(tlLbl);
  g.appendChild(tlRow);
}

function getState(){
  var s={tasks:{},deleted:{}};
  Object.keys(pillMap).forEach(function(id){if(pillMap[id].key)s.tasks[pillMap[id].key]=pillMap[id].done;});
  deletedKeys.forEach(function(k){s.deleted[k]=true;});
  return s;
}
function applyState(s){
  if(!s)return;
  var tasks=s.tasks||s;
  var deleted=s.deleted||{};
  Object.keys(deleted).forEach(function(k){deletedKeys.add(k);});
  Object.keys(pillMap).forEach(function(id){
    var k=pillMap[id].key;
    if(!k)return;
    if(deleted[k]){
      var el2=document.getElementById(id);if(el2)el2.remove();
      cardPills[pillMap[id].cardId]=(cardPills[pillMap[id].cardId]||[]).filter(function(p){return p!==id;});
      delete pillMap[id];
    } else if(tasks[k]!==undefined){
      pillMap[id].done=!!tasks[k];var el=document.getElementById(id);if(el)el.classList.toggle('done',!!tasks[k]);
    }
  });
  Object.keys(cardPills).forEach(function(cid){updateCardProg(cid);});
  updateProgDisplay();
}

function updateCardProg(cardId){
  var pids=cardPills[cardId]||[];
  var done=pids.filter(function(p){return pillMap[p]&&pillMap[p].done;}).length;
  var total=pids.length;
  var el=document.getElementById('cprog-'+cardId);if(el)el.textContent=done+' / '+total;
  var wcb=document.getElementById('wcb-'+cardId);if(wcb)wcb.classList.toggle('ticked',total>0&&done===total);
  var card=document.getElementById(cardId);
  if(!card)return;
  var wk=parseInt(card.getAttribute('data-wk'));
  var allDone=total>0&&done===total;
  card.classList.toggle('collapsed',allDone);
  card.classList.toggle('all-done',allDone);
  if(!isNaN(wk)){
    var isBehind=wk<currentWeek&&!allDone;
    card.classList.toggle('behind',isBehind);
    var headInner=card.querySelector('.card-head span');
    if(headInner){
      var existing=headInner.querySelector('.wk-badge');if(existing)existing.remove();
      if(isBehind){
        var b=document.createElement('span');b.className='wk-badge badge-behind';b.textContent='behind';
        var prog=headInner.querySelector('.card-prog');if(prog)headInner.insertBefore(b,prog);
      } else if(wk===currentWeek&&!allDone){
        var b2=document.createElement('span');b2.className='wk-badge badge-current';b2.textContent='current';
        var prog2=headInner.querySelector('.card-prog');if(prog2)headInner.insertBefore(b2,prog2);
      }
    }
  }
}
function updateProgDisplay(){
  var total=Object.keys(pillMap).length;
  var done=Object.values(pillMap).filter(function(p){return p.done;}).length;
  document.getElementById('prog').style.width=(total?Math.round(done/total*100):0)+'%';
  document.getElementById('ptxt').textContent=done+' / '+total;
}
function tickPill(id){
  if(!pillMap[id])return;
  pillMap[id].done=!pillMap[id].done;
  document.getElementById(id).classList.toggle('done',pillMap[id].done);
  updateCardProg(pillMap[id].cardId);updateProgDisplay();dbSave();
}
function tickWeek(cardId){
  var pids=cardPills[cardId]||[];
  var allDone=pids.every(function(p){return pillMap[p]&&pillMap[p].done;});
  pids.forEach(function(pid){
    if(!pillMap[pid])return;
    pillMap[pid].done=!allDone;
    document.getElementById(pid).classList.toggle('done',!allDone);
  });
  updateCardProg(cardId);updateProgDisplay();dbSave();
}
function delPill(e,id){
  e.stopPropagation();if(!pillMap[id])return;
  var cardId=pillMap[id].cardId;
  var key=pillMap[id].key;
  if(key)deletedKeys.add(key);
  document.getElementById(id).remove();
  cardPills[cardId]=(cardPills[cardId]||[]).filter(function(p){return p!==id;});
  delete pillMap[id];
  updateCardProg(cardId);updateProgDisplay();dbSave();
}
function addTask(key,cardId,pillsDivId){
  var typeEl=document.getElementById('sel-type-'+key);
  var labelEl=document.getElementById('sel-label-'+key);
  var dueEl=document.getElementById('sel-due-'+key);
  if(!typeEl||!labelEl||!labelEl.value.trim())return;
  var label=labelEl.value.trim();
  var dueDate=dueEl&&dueEl.value?new Date(dueEl.value):null;
  var dueDisplay=dueDate?fmtDate(dueDate):'';
  var task={type:typeEl.value,label:label,due:dueDisplay};
  var sk=key+'-'+task.type+'-'+label.replace(/\s/g,'_')+'-'+Date.now();
  var div=document.getElementById(pillsDivId);
  if(div)div.appendChild(makePillEl(task,cardId,sk));
  labelEl.value='';if(dueEl)dueEl.value='';
  updateCardProg(cardId);updateProgDisplay();dbSave();
}
function toggleEdit(){
  editMode=!editMode;
  document.getElementById('editToggle').classList.toggle('on',editMode);
  document.getElementById('editToggle').textContent=editMode?'Done editing':'Edit mode';
  document.getElementById('cards').classList.toggle('edit-mode',editMode);
  document.getElementById('dlRows').classList.toggle('edit-mode',editMode);
  var addDlBtn=document.getElementById('dlAddBtn');
  if(addDlBtn)addDlBtn.style.display=editMode?'':'none';
  if(!editMode){var f=document.getElementById('addDlForm');if(f)f.style.display='none';}
}
function filt(val,btn){
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.subj-row,.add-row').forEach(function(r){r.style.display='';});
  document.querySelectorAll('.week-card').forEach(function(card){
    var status=card.getAttribute('data-status');
    if(val==='all'){card.classList.remove('hidden');return;}
    if(val==='behind'){card.classList.toggle('hidden',status!=='behind');return;}
    if(val==='upcoming'){card.classList.toggle('hidden',status!=='upcoming'&&status!=='exam');return;}
    var hasSubj=false;
    card.querySelectorAll('.subj-row').forEach(function(r){
      var match=r.getAttribute('data-subj')===val;
      r.style.display=match?'':'none';if(match)hasSubj=true;
    });
    card.querySelectorAll('.add-row').forEach(function(r){r.style.display=r.innerHTML.indexOf(val)>-1?'':'none';});
    card.classList.toggle('hidden',!hasSubj);
  });
  var bd=document.getElementById('break-divider');
  if(bd)bd.style.display=(val==='all'||val==='behind'||val==='upcoming')?'':'none';
}

function registerSW(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(function(e){console.warn('SW reg failed:',e);});
  }
}

function sendNotif(title,body,tag){
  if(!('serviceWorker' in navigator)||!navigator.serviceWorker.controller)return;
  navigator.serviceWorker.controller.postMessage({type:'notify',title:title,body:body,tag:tag});
}

function checkDeadlineNotifications(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  getAllDeadlines().forEach(function(dl){
    if(dl.done||dl.deleted)return;
    var refDate=dl.showStart?dl.start:dl.end;
    if(!refDate)return;
    var days=daysUntil(refDate);
    var title,tag;
    if(days<=0){title='Due today!';tag=dl.id+'-0';}
    else if(days<=1){title='Due tomorrow!';tag=dl.id+'-1';}
    else if(days<=3){title='Due in '+days+' days';tag=dl.id+'-3';}
    else if(days<=7){title='Due in '+days+' days';tag=dl.id+'-7';}
    else return;
    var body=dl.subj+' — '+dl.label+(refDate?' ('+fmtDate(refDate)+')':'');
    sendNotif(title,body,dl.id+'-'+Date.now());
  });
}

function requestNotifPermission(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    Notification.requestPermission().then(function(p){
      if(p==='granted') setTimeout(checkDeadlineNotifications,500);
    });
  }
}

function testNotif(){
  if(!('Notification' in window)){alert('Notifications not supported in this browser.');return;}
  if(Notification.permission==='denied'){alert('Notifications blocked — go to site settings, allow notifications, then refresh.');return;}
  if(Notification.permission==='default'){
    Notification.requestPermission().then(function(p){
      if(p==='granted'){registerSW();setTimeout(function(){sendNotif('Test','Notifications are working!','test-1');},1000);}
      else alert('Permission denied.');
    });
    return;
  }
  sendNotif('Test notification','Notifications are working!','test-1');
  setTimeout(checkDeadlineNotifications,500);
}
registerSW();
requestNotifPermission();
setTimeout(function(){
  if(Notification.permission==='granted') checkDeadlineNotifications();
}, 3000);
</script>
